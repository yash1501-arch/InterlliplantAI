<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntelliPlant AI Knowledge Graph</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { font-family: Arial, sans-serif; margin: 0; background: #07111f; color: #f4f8fb; }
      .shell { max-width: 1100px; margin: 0 auto; padding: 2rem; }
      .card { background: #102235; border-radius: 16px; padding: 1.2rem; margin-bottom: 1rem; }
      input { width: 100%; border-radius: 8px; border: 1px solid #345; padding: 0.7rem; margin-top: 0.6rem; background: #0d1b27; color: #f4f8fb; }
      button { background: #2f8ef5; color: white; border: none; border-radius: 8px; padding: 0.7rem 1rem; cursor: pointer; margin-top: 0.6rem; }
      nav { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
      nav a { color: #8fb8d4; text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; background: #102235; }
      nav a:hover { background: #1b3d5c; color: #f4f8fb; }
      nav a.active { background: #2f8ef5; color: white; }
      .graph-viz { min-height: 400px; padding: 1rem; background: #0d1b27; border-radius: 12px; display: flex; flex-wrap: wrap; align-items: flex-start; gap: 0.5rem; }
      .node { display: inline-flex; align-items: center; padding: 0.6rem 1rem; border-radius: 999px; margin: 0.3rem; font-size: 0.9rem; }
      .node-equipment { background: #2f8ef5; }
      .node-concept { background: #1b3d5c; border: 1px solid #345; }
      .edge-list { margin-top: 0.5rem; }
      .edge-item { color: #8fb8d4; padding: 0.3rem 0; font-size: 0.9rem; }
      .arrow { color: #345; margin: 0 0.5rem; }
    </style>
  </head>
  <body>
    <main class="shell">
      <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="documents.html">Documents</a>
        <a href="chat.html">Chat</a>
        <a href="graph.html" class="active">Graph</a>
      </nav>

      <section class="card">
        <h1>Knowledge Graph</h1>
        <p>Visualize entity relationships extracted from uploaded industrial documents.</p>
        <input id="equipmentInput" placeholder="Enter equipment ID (e.g., pump-p101, motor-m201)..." value="pump-p101" />
        <button id="loadGraphBtn">Load Graph</button>
        <div id="graphContainer" class="graph-viz" style="margin-top: 1rem;">
          <p style="color: #8fb8d4;">Enter an equipment ID and click Load Graph to visualize the knowledge graph.</p>
        </div>
        <div id="edgeContainer" class="edge-list"></div>
      </section>
    </main>

    <script>
      const API = 'http://localhost:8000/api/v1';
      const graphContainer = document.getElementById('graphContainer');
      const edgeContainer = document.getElementById('edgeContainer');
      const equipmentInput = document.getElementById('equipmentInput');
      const loadGraphBtn = document.getElementById('loadGraphBtn');

      async function loadGraph() {
        const equipmentId = equipmentInput.value.trim() || 'pump-p101';
        graphContainer.innerHTML = 'Loading graph...';
        edgeContainer.innerHTML = '';
        try {
          const response = await fetch(`${API}/graph/${encodeURIComponent(equipmentId)}`);
          const data = await response.json();

          if (!data.nodes || !data.nodes.length) {
            graphContainer.innerHTML = '<p style="color: #8fb8d4;">No graph data available. Upload documents first.</p>';
            return;
          }

          graphContainer.innerHTML = data.nodes.map(node => `
            <span class="node node-${node.group || 'concept'}" title="${node.type}">
              ${node.label}
            </span>
          `).join('');

          if (data.edges && data.edges.length) {
            edgeContainer.innerHTML = '<h3>Relationships</h3>' +
              data.edges.map(edge => `
                <div class="edge-item">
                  <span class="node node-${edge.source === data.edges[0]?.source ? 'equipment' : 'concept'}" style="display:inline;padding:0.2rem 0.5rem;font-size:0.85rem;">${edge.source}</span>
                  <span class="arrow">→</span>
                  <span style="color:#8fb8d4;">${edge.label}</span>
                  <span class="arrow">→</span>
                  <span class="node node-${edge.target === data.edges[0]?.target ? 'equipment' : 'concept'}" style="display:inline;padding:0.2rem 0.5rem;font-size:0.85rem;">${edge.target}</span>
                </div>
              `).join('');
          } else {
            edgeContainer.innerHTML = '<p style="color: #8fb8d4; margin-top: 0.5rem;">No relationships extracted yet.</p>';
          }
        } catch (error) {
          graphContainer.innerHTML = `<p style="color: #ff6b6b;">Failed to load graph: ${error.message}</p>`;
        }
      }

      loadGraphBtn.addEventListener('click', loadGraph);
      equipmentInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadGraph(); });
      loadGraph();
    </script>
  </body>
</html>
