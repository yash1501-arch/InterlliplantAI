<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntelliPlant AI Dashboard</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { font-family: Arial, sans-serif; margin: 0; background: #07111f; color: #f4f8fb; }
      .shell { max-width: 1200px; margin: 0 auto; padding: 2rem; }
      .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .card { background: #102235; border-radius: 16px; padding: 1.2rem; }
      .stat { font-size: 2rem; font-weight: bold; margin-top: 0.3rem; }
      .label { color: #8fb8d4; font-size: 0.9rem; }
      table { width: 100%; border-collapse: collapse; margin-top: 0.8rem; }
      th, td { text-align: left; padding: 0.7rem; border-bottom: 1px solid #223b4d; }
      th { color: #8fb8d4; font-weight: normal; }
      nav { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
      nav a { color: #8fb8d4; text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; background: #102235; }
      nav a:hover { background: #1b3d5c; color: #f4f8fb; }
      nav a.active { background: #2f8ef5; color: white; }
    </style>
  </head>
  <body>
    <main class="shell">
      <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="documents.html">Documents</a>
        <a href="chat.html">Chat</a>
        <a href="graph.html">Graph</a>
      </nav>

      <h1>Dashboard</h1>
      <div class="grid">
        <section class="card">
          <div class="label">Documents ingested</div>
          <div id="docCount" class="stat">-</div>
        </section>
        <section class="card">
          <div class="label">Active sessions</div>
          <div id="sessionCount" class="stat">-</div>
        </section>
        <section class="card">
          <div class="label">Chat messages</div>
          <div id="msgCount" class="stat">-</div>
        </section>
        <section class="card">
          <div class="label">Equipment tracked</div>
          <div id="equipmentCount" class="stat">-</div>
        </section>
      </div>

      <section class="card" style="margin-top: 1rem;">
        <h2>Recent Documents</h2>
        <table>
          <thead>
            <tr><th>Name</th><th>Size</th><th>Status</th><th>Uploaded</th></tr>
          </thead>
          <tbody id="docRows"></tbody>
        </table>
      </section>
    </main>

    <script>
      const API = 'http://localhost:8000/api/v1';

      async function loadDashboard() {
        try {
          const metricsRes = await fetch(`${API}/dashboard/metrics`);
          const metrics = await metricsRes.json();
          document.getElementById('docCount').textContent = metrics.documents ?? 0;
          document.getElementById('sessionCount').textContent = metrics.sessions ?? 0;
          document.getElementById('msgCount').textContent = metrics.messages ?? 0;
          document.getElementById('equipmentCount').textContent = metrics.equipment ?? 0;

          const rows = document.getElementById('docRows');
          rows.innerHTML = '';
          (metrics.recent_documents || []).forEach(doc => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${doc.name}</td><td>${doc.size} B</td><td>${doc.status}</td><td>${doc.uploaded_at || '-'}</td>`;
            rows.appendChild(tr);
          });
        } catch (error) {
          document.getElementById('docRows').innerHTML = '<tr><td colspan="4">Unable to load dashboard</td></tr>';
        }
      }
      loadDashboard();
    </script>
  </body>
</html>
